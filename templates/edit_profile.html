{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="profile-container">

<h1>Edit Profile</h1>


<form action="{{ url_for('edit_profile') }}" 
      method="POST" 
      enctype="multipart/form-data">


<label>Change Profile Photo</label>

<input 
type="file"
name="profile_photo"
accept="image/*"
>


<br><br>


<label>Full Name</label>

<input 
type="text"
name="full_name"
value="{{ user[0] }}"
required
>


<label>Phone</label>

<input 
type="tel"
name="phone"
value="{{ user[1] }}"
required
>


<label>Date of Birth</label>

<input 
type="date"
name="dob"
value="{{ user[2] }}"
>


<label>Gender</label>

<select name="gender">


<option value="Male"
{% if user[3] == "Male" %}selected{% endif %}>
Male
</option>


<option value="Female"
{% if user[3] == "Female" %}selected{% endif %}>
Female
</option>


<option value="Other"
{% if user[3] == "Other" %}selected{% endif %}>
Other
</option>


</select>


<br><br>


<button type="submit">
Save Changes
</button>


</form>


<br>


<a href="{{ url_for('profile') }}">
<button>
Cancel
</button>
</a>


</div>

{% endblock %}
